<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Drafy — Free QR Code Generator</title>
<meta name="description" content="Drafy: a free QR code generator that makes static codes that never expire. Offline, no account, no ads.">
<link rel="canonical" href="https://play.google.com/store/apps/details?id=com.mumullickm.drafy">
<meta http-equiv="refresh" content="0; url=https://play.google.com/store/apps/details?id=com.mumullickm.drafy">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Space+Grotesk:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--paper:#FBF6EF;--ink:#20242E;--muted:#6B6F7B;--coral:#F1654B;--indigo:#33408F}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{background:var(--paper);color:var(--ink);
    font-family:"Space Grotesk",system-ui,sans-serif;
    background-image:linear-gradient(rgba(51,64,143,.08) 1px,transparent 1px),
      linear-gradient(90deg,rgba(51,64,143,.08) 1px,transparent 1px);background-size:28px 28px;
    display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
  .mk{width:38px;height:38px;border:3px solid var(--ink);border-radius:6px;position:relative;margin:0 auto 18px}
  .mk::after{content:"";position:absolute;inset:9px;border:3px solid var(--ink);border-radius:2px}
  .word{font-family:"Share Tech Mono",monospace;text-transform:uppercase;letter-spacing:.34em;font-size:22px}
  p{color:var(--muted);margin-top:14px;font-size:16px}
  a{display:inline-block;margin-top:22px;font-family:"Share Tech Mono",monospace;text-transform:uppercase;
    letter-spacing:.1em;font-size:14px;color:#fff;background:var(--coral);text-decoration:none;
    padding:12px 22px;border-radius:6px}
</style>
</head>
<body>
  <main>
    <div class="mk"></div>
    <div class="word">Drafy</div>
    <p>Taking you to Google Play&hellip;</p>
    <a href="https://play.google.com/store/apps/details?id=com.mumullickm.drafy">Open in Google Play</a>
  </main>
  <script>location.replace("https://play.google.com/store/apps/details?id=com.mumullickm.drafy");</script>
</body>
</html>
